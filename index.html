<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManuSMP | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <a href="index.html" style="text-decoration: none;">
        <div class="nav-logo">ManuSMP</div>
    </a>
    <div class="nav-links">
        <a href="index.html" class="active">Home</a>
        <a href="about.html">About</a>
        <a href="team.html">Team</a>
    </div>
</nav>

<div class="container">
    <header class="hero">
        <h1 class="glow-text">ManuSMP</h1>
        <p class="subtitle">ManuSMP.gleeze.com</p>
    </header>

    <div class="card status-card">
        <div class="status-header">
            <div class="status-indicator">
                <span class="dot" style="height: 10px; width: 10px; background-color: #2ed573; border-radius: 50%; display: inline-block; margin-right: 5px;"></span>
                <span class="status-label">STATUS: <span class="online">ONLINE</span></span>
            </div>
            <div class="player-count">
                <span id="player-count" style="font-weight: bold; color: #2ed573;">Lädt...</span>
            </div>
        </div>
        
        <div class="server-ip-box" onclick="copyIp()" style="position: relative; z-index: 5;">
            <div class="ip-info">
                <span class="label" style="font-size: 0.7rem; color: #555; display: block;">SERVER IP (Klicken zum Kopieren)</span>
                <span class="ip-text">ManuSMP.gleeze.com</span>
            </div>
            <div class="copy-icon">📋</div>
        </div>
    </div>

    <h2 class="glow-text" style="font-size: 1.2rem; margin-top: 40px;">Community</h2>
    <div class="discord-grid">
        <a href="https://discord.gg/XBbZRa7HPs" target="_blank" class="discord-card">MANUSMP Discord</a>
        <a href="https://guns.lol/manu1590" target="_blank" class="discord-card profile-btn">Mein Profil (guns.lol)</a>
    </div>
</div>

<div id="custom-alert">📋 IP erfolgreich kopiert!</div>

<footer><p>ManuSMP.gleeze.com &copy; 2026</p></footer>

<audio id="bgMusic" loop preload="auto"><source src="background.mp3" type="audio/mpeg"></audio>

<script>
    function copyIp() {
        const ip = "ManuSMP.gleeze.com";
        if (navigator.clipboard) {
            navigator.clipboard.writeText(ip).then(() => {
                showToast();
            });
        } else {
            // Fallback für ältere Browser
            const textArea = document.createElement("textarea");
            textArea.value = ip;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showToast();
        }
    }

    function showToast() {
        const alertBox = document.getElementById('custom-alert');
        alertBox.classList.add('show');
        setTimeout(() => { alertBox.classList.remove('show'); }, 3000);
    }

    async function updatePlayerCount() {
        try {
            const res = await fetch(`https://mcapi.us/server/status?ip=ManuSMP.gleeze.com&_=${Date.now()}`);
            const data = await res.json();
            if(data.online) {
                document.getElementById('player-count').innerText = data.players.now + " / " + data.players.max;
            } else {
                document.getElementById('player-count').innerText = "Offline";
            }
        } catch (e) { 
            document.getElementById('player-count').innerText = "Offline"; 
        }
    }
    
    updatePlayerCount();
    setInterval(updatePlayerCount, 30000);

    const music = document.getElementById("bgMusic");
    function startMusic() { 
        music.play(); 
        document.removeEventListener('click', startMusic); 
        document.removeEventListener('touchstart', startMusic); 
    }
    document.addEventListener('click', startMusic);
    document.addEventListener('touchstart', startMusic);
    
    window.addEventListener('load', () => { 
        music.volume = 0.1; // 10% Lautstärke
        updatePlayerCount();
    });
</script>
</body>
</html>
