<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ManuSMP | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-logo">ManuSMP</div>
    <div class="nav-links">
        <a href="index.html" class="active">Home</a>
        <a href="about.html">About</a>
        <a href="team.html">Team</a>
    </div>
</nav>

<div class="container">
    <header class="hero">
        <h1 class="glow-text">ManuSMP</h1>
        <p class="subtitle">ManuSMP.gleeze.com</p>
    </header>

    <section class="status-card">
        <div class="status-header">
            <div class="status-indicator">
                <span class="dot"></span>
                <span class="status-label">STATUS: <span class="online">ONLINE</span></span>
            </div>
            <div class="player-count">
                <span class="count-label">LIVE PLAYER:</span>
                <span id="player-count">Lädt...</span>
            </div>
        </div>
        
        <div class="server-ip-box" onclick="copyIp()">
            <div class="ip-info">
                <span class="label">SERVER IP</span>
                <span class="ip-text" id="serverIp">ManuSMP.gleeze.com</span>
            </div>
            <div class="copy-icon">📋</div>
        </div>
    </section>

    <section class="content-section">
        <h2 class="purple-glow">Community</h2>
        <div class="discord-grid">
            <a href="https://discord.gg/XBbZRa7HPs" target="_blank" class="discord-card">MANUSMP Discord</a>
            <a href="https://discord.gg/d75gpsMQ" target="_blank" class="discord-card" style="background: #5865F2;">Zeno Discord</a>
            <a href="https://guns.lol/manu1590" target="_blank" class="discord-card" style="background: #222; border: 1px solid #444;">Mein Profil (guns.lol)</a>
        </div>
    </section>
</div>

<footer><p>ManuSMP.gleeze.com &copy; 2026</p></footer>

<script>
    function copyIp() {
        const ip = "ManuSMP.gleeze.com";
        navigator.clipboard.writeText(ip).then(() => { alert("IP kopiert!"); });
    }
    async function updatePlayerCount() {
        try {
            const res = await fetch('https://mcapi.us/server/status?ip=ManuSMP.gleeze.com');
            const data = await res.json();
            document.getElementById('player-count').innerText = data.online ? data.players.now + " / " + data.players.max : "Offline";
        } catch (e) { document.getElementById('player-count').innerText = "0 Online"; }
    }
    updatePlayerCount();
    setInterval(updatePlayerCount, 30000);
</script>
</body>
</html>
