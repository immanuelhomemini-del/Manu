<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManuSMP | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <a href="index.html" style="text-decoration: none;">
        <div class="nav-logo">ManuSMP</div>
    </a>
    <div class="nav-links">
        <a href="index.html" class="active">Home</a>
        <a href="about.html">About</a>
        <a href="team.html">Team</a>
    </div>
</nav>

<div class="container">
    <header class="hero">
        <h1 class="glow-text">ManuSMP</h1>
        <p class="subtitle">ManuSMP.gleeze.com</p>
    </header>

    <div class="card status-card">
        <div class="status-header">
            <div class="status-indicator">
                <span class="dot"></span>
                <span class="status-label">STATUS: <span class="online">ONLINE</span></span>
            </div>
            <div class="player-count">
                <span id="player-count">Lädt...</span>
            </div>
        </div>
        
        <div class="server-ip-box" onclick="copyIp()">
            <div class="ip-info">
                <span class="label">SERVER IP</span>
                <span class="ip-text">ManuSMP.gleeze.com</span>
            </div>
            <div class="copy-icon">📋</div>
        </div>
    </div>

    <h2 class="glow-text" style="font-size: 1.5rem; margin-top: 40px;">Community</h2>
    <div class="discord-grid">
        <a href="https://discord.gg/XBbZRa7HPs" target="_blank" class="discord-card">MANUSMP Discord</a>
        <a href="https://guns.lol/manu1590" target="_blank" class="discord-card profile-btn">Mein Profil (guns.lol)</a>
    </div>
</div>

<div id="custom-alert">📋 IP erfolgreich kopiert!</div>

<footer><p>ManuSMP.gleeze.com &copy; 2026</p></footer>

<audio id="bgMusic" loop preload="auto"><source src="background.mp3" type="audio/mpeg"></audio>

<script>
    // IP Kopieren mit Toast-Animation
    function copyIp() {
        navigator.clipboard.writeText("ManuSMP.gleeze.com").then(() => {
            const alertBox = document.getElementById('custom-alert');
            alertBox.classList.add('show');
            setTimeout(() => { alertBox.classList.remove('show'); }, 3000);
        });
    }

    // Live Player Abfrage
    async function updatePlayerCount() {
        try {
            const res = await fetch(`https://mcapi.us/server/status?ip=ManuSMP.gleeze.com&_=${Date.now()}`);
            const data = await res.json();
            document.getElementById('player-count').innerText = data.online ? data.players.now + " / " + data.players.max : "Offline";
        } catch (e) { document.getElementById('player-count').innerText = "Offline"; }
    }
    updatePlayerCount();
    setInterval(updatePlayerCount, 30000);

    // Musik-Logik
    const music = document.getElementById("bgMusic");
    function startMusic() { 
        music.play(); 
        document.removeEventListener('click', startMusic); 
        document.removeEventListener('touchstart', startMusic); 
    }
    document.addEventListener('click', startMusic);
    document.addEventListener('touchstart', startMusic);
    window.addEventListener('load', () => { 
        music.volume = 0.2; // Lautstärke auf 20%
        startMusic(); 
    });
</script>
</body>
</html>
