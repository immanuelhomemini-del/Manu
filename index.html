<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManuSMP | Home</title>
    <link rel="stylesheet" href="style.css?v=1.2">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        function copyIP() {
            const ip = "ManuSMP.gleeze.com";
            navigator.clipboard.writeText(ip).then(() => {
                const btn = document.getElementById('copy-status');
                btn.innerText = 'KOPIERT!';
                setTimeout(() => { btn.innerText = 'IP KOPIEREN'; }, 2000);
            });
        }
    </script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo">ManuSMP</div>
        <div class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="about.html">About</a>
            <a href="team.html">Team</a>
        </div>
    </nav>

    <div class="main-content">
        <h1 class="hero-title">MANUSMP</h1>
        <p class="subtitle">ManuSMP.gleeze.com</p>

        <div class="server-card">
            <div class="status-bar">
                <span class="status-dot"></span>
                <span class="status-text">STATUS: ONLINE</span>
                <span class="player-count">4 / 100</span>
            </div>
            <div class="ip-box" onclick="copyIP()">
                <div class="ip-text">
                    <span class="label">SERVER IP (KLICK ZUM KOPIEREN)</span>
                    <span class="address">ManuSMP.gleeze.com</span>
                </div>
                <div class="copy-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    <span id="copy-status">IP KOPIEREN</span>
                </div>
            </div>
        </div>

        <h2 class="section-title">COMMUNITY</h2>
        <div class="button-grid">
            <a href="https://discord.gg/XBbZRa7HPs" target="_blank" class="glass-btn">MANUSMP DISCORD</a>
            <a href="https://guns.lol/manu1590" target="_blank" class="glass-btn">MEIN PROFIL (GUNS.LOL)</a>
        </div>
    </div>

    <audio id="bgMusic" loop><source src="background.mp3" type="audio/mpeg"></audio>
    <script>
        const m = document.getElementById("bgMusic"); m.volume = 0.1;
        document.addEventListener('click', () => { m.play().catch(e => console.log(e)); }, {once:true});
    </script>
</body>
</html>
