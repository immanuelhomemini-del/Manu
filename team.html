    <div class="section-badge">LEITUNG</div>

    <div class="feature-card" style="border-left: 4px solid #2ed573;"><h3>🛡️ Mod</h3><p>★...★</p></div>

<footer><p>ManuSMP.gleeze.com &copy; 2026</p></footer>

<audio id="bgMusic" loop preload="auto">
    <source src="background.mp3" type="audio/mpeg">
</audio>

<script>
    const music = document.getElementById("bgMusic");

    function playAudio() {
        music.play().then(() => {
            console.log("Team-Seite Musik spielt");
            // Entfernt die Event-Listener, damit sie nicht bei jedem Klick neu starten
            document.removeEventListener('click', playAudio);
            document.removeEventListener('touchstart', playAudio);
        }).catch(error => {
            console.log("Autoplay blockiert, warte auf Interaktion...");
        });
    }

    // Hört auf Klicks und Berührungen am Handy
    document.addEventListener('click', playAudio);
    document.addEventListener('touchstart', playAudio);

    // Versucht beim Laden der Seite die Lautstärke zu setzen
    window.addEventListener('load', () => {
        music.volume = 0.4;
        playAudio(); 
    });
</script>
</body>
