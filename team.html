<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManuSMP | Team</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="./style.css?v=101">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }
        .fade-in.appear {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="./index.html" class="nav-logo">ManuSMP</a>
        <div class="nav-links">
            <a href="./index.html">Home</a>
            <a href="./about.html">About</a>
            <a href="./team.html" class="active">Team</a>
        </div>
    </nav>

    <div class="main-content">
        <h1 class="hero-title fade-in" style="font-size: 3rem; margin-bottom: 30px;">TEAM</h1>
        
        <div style="display: grid; gap: 15px; text-align: left; width: 100%;">
            <div class="server-card fade-in" style="margin-bottom: 15px; border-left: 5px solid #2ed573;">
                <span style="color: #2ed573; font-weight: 900; font-size: 0.7rem; display: block; margin-bottom: 5px;">OWNER</span>
                <h3>👑 Manu</h3>
            </div>
            <div class="server-card fade-in" style="margin-bottom: 15px; border-left: 5px solid #2ed573;">
                <span style="color: #2ed573; font-weight: 900; font-size: 0.7rem; display: block; margin-bottom: 5px;">MANAGER</span>
                <h3>💼 Leon</h3>
            </div>
            <div class="server-card fade-in" style="margin-bottom: 15px; border-left: 5px solid #2ed573;">
                <span style="color: #2ed573; font-weight: 900; font-size: 0.7rem; display: block; margin-bottom: 5px;">MOD</span>
                <h3>🛡️ ★...★</h3>
            </div>
            <div class="server-card fade-in" style="margin-bottom: 15px; border-left: 5px solid #2ed573;">
                <span style="color: #2ed573; font-weight: 900; font-size: 0.7rem; display: block; margin-bottom: 5px;">MOD</span>
                <h3>🛡️ WizardLocket35</h3>
            </div>
            <div class="server-card fade-in" style="margin-bottom: 15px; border-left: 5px solid #2ed573;">
                <span style="color: #2ed573; font-weight: 900; font-size: 0.7rem; display: block; margin-bottom: 5px;">HELPER</span>
                <h3>🔨 NotMikeYT, Elias, Basti</h3>
            </div>
        </div>

        <footer class="fade-in" style="margin-top: 80px; opacity: 0.4; font-size: 0.8rem; padding-bottom: 20px;">
            &copy; 2026 ManuSMP Network. Alle Rechte vorbehalten.
        </footer>
    </div>

    <audio id="bgMusic"><source src="background.mp3" type="audio/mpeg"></audio>

    <script>
        const faders = document.querySelectorAll('.fade-in');
        const appearOnScroll = new IntersectionObserver(function(entries) {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('appear');
                } else {
                    entry.target.classList.remove('appear');
                }
            });
        }, { threshold: 0.01 });
        faders.forEach(fader => { appearOnScroll.observe(fader); });
    </script>
    <script src="./music-player.js"></script>
</body>
</html>
