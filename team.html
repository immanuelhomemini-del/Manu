<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManuSMP | Team</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --bg-dark: #050805;
            --accent-green: #2ed573;
            --accent-blue: #3498db;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg-dark);
            font-family: 'Montserrat', sans-serif;
            color: white;
            margin: 0;
            background-image: radial-gradient(circle at 50% -20%, #10331d, transparent 800px);
            background-attachment: fixed;
        }

        .container { max-width: 900px; margin: 40px auto; padding: 20px; }

        /* Navbar Fix */
        .navbar { display: flex; justify-content: space-between; padding: 20px 5%; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--glass-border); }
        .nav-links a { color: white !important; text-decoration: none; margin-left: 20px; font-weight: 700; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-green) !important; }

        /* Team Cards */
        .team-grid { display: grid; gap: 20px; margin-top: 30px; }

        .team-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            transition: 0.3s ease;
        }

        .team-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .team-card.green { border-left: 5px solid var(--accent-green); box-shadow: -10px 0 20px rgba(46, 213, 115, 0.05); }
        .team-card.blue { border-left: 5px solid var(--accent-blue); box-shadow: -10px 0 20px rgba(52, 152, 219, 0.05); }

        .role-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .badge-owner { background: var(--accent-green); color: black; }
        .badge-mod { background: rgba(46, 213, 115, 0.1); color: var(--accent-green); border: 1px solid var(--accent-green); }
        .badge-helper { background: rgba(52, 152, 219, 0.1); color: var(--accent-blue); border: 1px solid var(--accent-blue); }

        .member-name { font-size: 1.5rem; font-weight: 700; margin: 0; display: flex; align-items: center; gap: 10px; }
        
        .glow-title {
            text-align: center;
            color: var(--accent-green);
            font-weight: 900;
            font-size: 2.5rem;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(46, 213, 115, 0.3);
            margin-bottom: 40px;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="index.html" style="text-decoration: none;"><div class="nav-logo" style="color: #2ed573; font-weight: 900;">ManuSMP</div></a>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="team.html" class="active">Team</a>
    </div>
</nav>

<div class="container">
    <h1 class="glow-title">ManuStaff</h1>

    <div class="team-grid">
        <div class="team-card green">
            <span class="role-badge badge-owner">Owner</span>
            <h3 class="member-name">👑 Manu</h3>
        </div>

        <div class="team-card green">
            <span class="role-badge badge-owner">Manager</span>
            <h3 class="member-name">💼 Leon</h3>
        </div>

        <div class="team-card green">
            <span class="role-badge badge-mod">Mod</span>
            <h3 class="member-name">🛡️ ★...★</h3>
        </div>

        <div class="team-card green">
            <span class="role-badge badge-mod">T-Mod</span>
            <h3 class="member-name">🌱 WizardLocket35</h3>
        </div>

        <div class="team-card blue">
            <span class="role-badge badge-helper">Helper</span>
            <h3 class="member-name" style="font-size: 1.2rem;">NotMikeYT, Elias, Basti</h3>
        </div>
    </div>
</div>

<audio id="bgMusic" loop><source src="background.mp3" type="audio/mpeg"></audio>

<script>
    const m = document.getElementById("bgMusic");
    m.volume = 0.1;
    document.addEventListener('click', () => { m.play(); }, {once:true});
</script>

</body>
</html>
