<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManuSMP | Team</title>
    <link rel="stylesheet" href="style.css?v=1.2">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo">ManuSMP</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="team.html" class="active">Team</a>
        </div>
    </nav>

    <div style="max-width: 800px; margin: 40px auto; padding: 20px;">
        <h1 style="text-align: center; color: var(--accent-green);">TEAM</h1>
        <div style="display: grid; gap: 15px;">
            <div class="team-card" style="border-left: 5px solid var(--accent-green);">
                <span style="background: var(--accent-green); color: black; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 900;">OWNER</span>
                <h3 style="margin: 10px 0 0 0;">👑 Manu</h3>
            </div>
            <div class="team-card" style="border-left: 5px solid var(--accent-blue);">
                <span style="background: var(--accent-blue); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 900;">HELPER</span>
                <p style="margin: 10px 0 0 0;">NotMikeYT, Elias, Basti</p>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop><source src="background.mp3" type="audio/mpeg"></audio>
    <script>
        const m = document.getElementById("bgMusic"); m.volume = 0.1;
        document.addEventListener('click', () => { m.play().catch(e => console.log(e)); }, {once:true});
    </script>
</body>
</html>
