<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManuSMP | Team</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <a href="index.html" style="text-decoration: none;"><div class="nav-logo">ManuSMP</div></a>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="team.html" class="active">Team</a>
    </div>
</nav>

<div class="container">
    <h1 class="glow-text">ManuSMP Staff</h1>

    <div class="card" style="border-left: 4px solid var(--accent-green);">
        <span class="role-badge" style="background: #2ed573; color: #000; padding: 4px 12px; border-radius: 4px; font-size: 0.75rem; font-weight: 900; text-transform: uppercase;">OWNER</span>
        <h3 style="margin: 15px 0 0 0; font-size: 1.4rem;">👑 Manu</h3>
    </div>

    <div class="card" style="border-left: 4px solid var(--accent-green);">
        <span class="role-badge" style="background: rgba(46, 213, 115, 0.2); color: #2ed573; padding: 4px 12px; border-radius: 4px; font-size: 0.75rem; font-weight: 800;">MOD</span>
        <h3 style="margin: 15px 0 0 0;">🛡️ ★...★</h3>
    </div>

    <div class="card" style="border-left: 4px solid var(--accent-green);">
        <span class="role-badge" style="background: rgba(46, 213, 115, 0.1); color: #2ed573; padding: 4px 12px; border-radius: 4px; font-size: 0.75rem; font-weight: 800;">T-MOD</span>
        <h3 style="margin: 15px 0 0 0;">🌱 Lelelog / WizardLocket35</h3>
    </div>

    <div class="card" style="border-left: 4px solid #3498db;">
        <span class="role-badge" style="background: rgba(52, 152, 219, 0.2); color: #3498db; padding: 4px 12px; border-radius: 4px; font-size: 0.75rem; font-weight: 800;">HELPER</span>
        <p style="margin: 15px 0 0 0; font-weight: bold; font-size: 1.1rem;">NotMikeYT, Elias, Basti</p>
    </div>
</div>

<audio id="bgMusic" loop preload="auto"><source src="background.mp3" type="audio/mpeg"></audio>

<script>
    const music = document.getElementById("bgMusic");
    // Lautstärke auf 10%
    music.volume = 0.1;
    
    function startAudio() {
        music.play();
        document.removeEventListener('click', startAudio);
        document.removeEventListener('touchstart', startAudio);
    }
    document.addEventListener('click', startAudio);
    document.addEventListener('touchstart', startAudio);
</script>

</body>
</html>
