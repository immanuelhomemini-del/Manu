<!DOCTYPE html>

    <link rel="stylesheet" href="style.css?v=85">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">ManuSMP</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>

    <div class="main-content">
        <h1 class="hero-title fade-in" style="font-size: 3rem; margin-bottom: 30px;">TEAM</h1>
        
        <div style="display: grid; gap: 15px; text-align: left;">
            <div class="server-card fade-in" style="margin: 0; border-left: 5px solid #2ed573;">
                <span style="color: #2ed573; font-weight: 900; font-size: 0.7rem;">OWNER</span>
                <h3 style="margin-top: 5px;">👑 Manu</h3>
            </div>
            <div class="server-card fade-in" style="margin: 0; border-left: 5px solid #2ed573;">
                <span style="color: #2ed573; font-weight: 900; font-size: 0.7rem;">MANAGER</span>
                <h3 style="margin-top: 5px;">💼 Leon</h3>
            </div>
            <div class="server-card fade-in" style="margin: 0; border-left: 5px solid #2ed573;">
                <span style="color: #2ed573; font-weight: 900; font-size: 0.7rem;">MOD</span>
                <h3 style="margin-top: 5px;">🛡️ ★...★</h3>
            </div>
            <div class="server-card fade-in" style="margin: 0; border-left: 5px solid #2ed573;">
                <span style="color: #2ed573; font-weight: 900; font-size: 0.7rem;">MOD</span>
                <h3 style="margin-top: 5px;">🛡️ WizardLocket35</h3>
            </div>
            <div class="server-card fade-in" style="margin: 0; border-left: 5px solid #2ed573;">
                <span style="color: #2ed573; font-weight: 900; font-size: 0.7rem;">HELPER</span>
                <h3 style="margin-top: 5px;">🔨 NotMikeYT, Elias, Basti</h3>

        <footer class="fade-in" style="margin-top: 80px; opacity: 0.4; font-size: 0.8rem; padding-bottom: 20px;">
            &copy; 2026 ManuSMP Network. Alle Rechte vorbehalten.
        </footer>
    </div>

    <audio id="bgMusic" loop><source src="background.mp3" type="audio/mpeg"></audio>

    <script>
        const faders = document.querySelectorAll('.fade-in');
        const appearOptions = { threshold: 0.05, rootMargin: "0px 0px -20px 0px" };
        
        const appearOnScroll = new IntersectionObserver(function(entries, appearOnScroll) {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('appear');
                } else {
                    entry.target.classList.remove('appear');
                }
            });
        }, appearOptions);
        faders.forEach(fader => { appearOnScroll.observe(fader); });
    </script>
    <script src="music-player.js"></script>
</body>
