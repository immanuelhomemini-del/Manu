<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManuSMP | About</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar">
    <div class="nav-logo">ManuSMP</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html" class="active">About</a>
        <a href="team.html">Team</a>
    </div>
</nav>

<div class="container">
    <h1 class="purple-glow" style="margin-top: 50px; text-align: center;">Über mich</h1>
    <div class="glass-card">
        <h3>Wer bin ich?</h3>
        <p>Ich bin Manu, ein 14-jähriger Developer. Mein Fokus liegt auf der Entwicklung von Minecraft-Servern und der Optimierung von Systemen.</p>
        <p style="margin-top: 15px; color: #888;">Ich leite das ManuSMP Netzwerk und kümmere mich um die technische Umsetzung sowie das Design.</p>
    </div>
</div>

<audio id="bgMusic" loop preload="auto">
    <source src="background.mp3" type="audio/mpeg">
</audio>

<script>
    const music = document.getElementById("bgMusic");
    
    function startMusic() {
        music.play().then(() => {
            console.log("Musik läuft auf About");
            document.removeEventListener('click', startMusic);
            document.removeEventListener('touchstart', startMusic);
        }).catch(err => console.log("Warte auf Interaktion..."));
    }

    document.addEventListener('click', startMusic);
    document.addEventListener('touchstart', startMusic);
    
    window.addEventListener('load', () => {
        music.volume = 0.4;
        startMusic();
    });
</script>
</body>
</html>
