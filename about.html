<div class="container">
    <h1 class="glow-text">Über mich</h1>
    <div class="card">
        <h2 style="color: #2ed573; margin-bottom: 15px;">Wer bin ich?</h2>
        <p>Ich bin <strong>Manu</strong>, ein 14-jähriger Developer. Mein Fokus liegt auf der Entwicklung von Minecraft-Servern und der Optimierung von Systemen.</p>
        <p style="margin-top: 20px; opacity: 0.7;">Ich leite das ManuSMP Netzwerk und kümmere mich um die technische Umsetzung sowie das Design.</p>
    </div>

<audio id="bgMusic" loop preload="auto"><source src="background.mp3" type="audio/mpeg"></audio>
<script>
    const music = document.getElementById("bgMusic");
    function playAudio() { music.play(); document.removeEventListener('click', playAudio); document.removeEventListener('touchstart', playAudio); }
    document.addEventListener('click', playAudio);
    document.addEventListener('touchstart', playAudio);
    window.addEventListener('load', () => { music.volume = 0.1; playAudio(); });
</script>
</body>
